name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:unit

  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Remove stale PPAs that block apt-get update
        # The deadsnakes and ondrej/php PPAs return 403 on this runner and
        # cause 'apt-get update' (run internally by playwright install-deps)
        # to exit non-zero, preventing Chromium system libs from installing.
        run: |
          sudo rm -f /etc/apt/sources.list.d/deadsnakes*.list \
                     /etc/apt/sources.list.d/ondrej*.list \
                     /etc/apt/sources.list.d/*deadsnakes* \
                     /etc/apt/sources.list.d/*ondrej* || true
          sudo apt-get update -qq 2>&1 | grep -v "^W:" || true

      - name: Install Playwright browser and system dependencies
        run: npx playwright install --with-deps chromium

      - run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
