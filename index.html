<script type="text/babel">
const { useState, useMemo, useRef } = React;

// STABLE — never change between versions; user data persists automatically
const STORAGE_KEY  = "slt-loan-tracker";
const AV_KEY_STORE = "slt-av-key";
const LEGACY_KEYS  = ["slt-data-v6","slt-data-v5","slt-data-v4"];

const fmt    = n => (isNaN(n)||n==null)?"—":n.toLocaleString("en-NZ",{style:"currency",currency:"NZD",maximumFractionDigits:2});
const fmtPct = n => (isNaN(n)||n==null)?"—":`${n>=0?"+":""}${n.toFixed(2)}%`;
const sc     = v => (v==null||isNaN(v))?"#888":v>=0?"#60c080":"#e06060";
const today  = () => new Date().toISOString().slice(0,10);

const DEFAULT = {
  annualReturn: 8,
  months: 24,
  sp500Baseline: null,
  priceHistory: [],
  drawdowns: [],   // [{id, date, amount, note}]  — money taken OUT of Sharesies
  repayments: [],  // [{id, date, amount}]          — money paid BACK in
};

function load(key,def){
  try{
    const r=localStorage.getItem(key);
    if(r) return JSON.parse(r);
    for(const lk of LEGACY_KEYS){
      const old=localStorage.getItem(lk);
      if(old){ const p=JSON.parse(old);
               if(p.priceHistory) p.priceHistory=p.priceHistory.filter(h=>h.portfolioValue>0);
               localStorage.setItem(key,JSON.stringify(p)); localStorage.removeItem(lk); return p; }
    }
    return def;
  }catch{return def;}
}
function save(key,val){try{localStorage.setItem(key,JSON.stringify(val));}catch{}}

// ── Alpha Vantage ─────────────────────────────────────────────────────────────
async function fetchAlphaVantage(apiKey){
  const url=`https://www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol=SPY&outputsize=compact&apikey=${apiKey}`;
  const res=await fetch(url);
  if(!res.ok) throw new Error(`HTTP ${res.status} from Alpha Vantage`);
  const data=await res.json();
  if(data["Note"])          throw new Error("Rate limit reached — free tier: 25 calls/day.");
  if(data["Information"])   throw new Error(data["Information"]);
  if(data["Error Message"]) throw new Error(data["Error Message"]);
  const series=data["Time Series (Daily)"];
  if(!series) throw new Error("Keys in response: "+Object.keys(data).join(", "));
  const dates=Object.keys(series).sort((a,b)=>b.localeCompare(a));
  const gc=d=>parseFloat(series[d]["4. close"]);
  const price=gc(dates[0]);
  const thisYear=new Date().getFullYear().toString();
  const ytdStart=dates.filter(d=>d.startsWith(thisYear)).pop()||dates[dates.length-1];
  return{
    price,
    changeToday:((price-gc(dates[1]))/gc(dates[1]))*100,
    change1W:   ((price-gc(dates[Math.min(5,dates.length-1)]))/gc(dates[Math.min(5,dates.length-1)]))*100,
    change1M:   ((price-gc(dates[Math.min(22,dates.length-1)]))/gc(dates[Math.min(22,dates.length-1)]))*100,
    changeYTD:  ((price-gc(ytdStart))/gc(ytdStart))*100,
    lastUpdated:new Date(dates[0]).toLocaleDateString("en-NZ",{day:"numeric",month:"short",year:"numeric"}),
    source:"Alpha Vantage (SPY)"
  };
}

// ── SVG Line Chart ─────────────────────────────────────────────────────────────
function LineChart({history,loanAmount}){
  const [tip,setTip]=useState(null);
  const svgRef=useRef(null);
  if(!history||history.length<2) return(
    <div style={{height:200,display:"flex",alignItems:"center",justifyContent:"center",color:"#444460",fontSize:13}}>
      Chart appears after 2+ market refreshes
    </div>
  );
  const W=680,H=220,PL=64,PR=20,PT=16,PB=36;
  const iW=W-PL-PR,iH=H-PT-PB;
  const allV=[...history.map(h=>h.portfolioValue),...history.map(h=>h.cumulativePaid),loanAmount];
  const minV=Math.min(...allV)*0.97, maxV=Math.max(...allV)*1.03;
  const xs=i=>PL+(i/(history.length-1))*iW;
  const ys=v=>PT+iH-((v-minV)/(maxV-minV))*iH;
  const line=(arr,color,dash)=>{
    const d=arr.map((v,i)=>`${i===0?"M":"L"}${xs(i).toFixed(1)},${ys(v).toFixed(1)}`).join(" ");
    return<path d={d} fill="none" stroke={color} strokeWidth="2" strokeDasharray={dash?"6,4":"none"} strokeLinecap="round" strokeLinejoin="round"/>;
  };
  const fK=v=>v>=1000?`$${(v/1000).toFixed(1)}k`:`$${v.toFixed(0)}`;
  const onMove=e=>{
    const svg=svgRef.current; if(!svg) return;
    const rect=svg.getBoundingClientRect();
    const x=(e.clientX-rect.left)*(W/rect.width)-PL;
    const idx=Math.max(0,Math.min(history.length-1,Math.round((x/iW)*(history.length-1))));
    const svgW=rect.width;
    const tipLeft=xs(idx)/W*svgW;
    const isRight=idx>history.length*0.6;
    setTip({idx,tipLeft,svgW,isRight});
  };
  const t=tip?history[tip.idx]:null;
  return(
    <div style={{position:"relative"}}>
      <svg ref={svgRef} viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto",cursor:"crosshair"}}
        onMouseMove={onMove} onMouseLeave={()=>setTip(null)}>
        {[0,1,2,3,4].map(i=>{const v=minV+(i/4)*(maxV-minV);const y=ys(v);return<g key={i}>
          <line x1={PL} y1={y} x2={W-PR} y2={y} stroke="#1e1e32" strokeWidth="1"/>
          <text x={PL-6} y={y+4} textAnchor="end" fill="#444460" fontSize="10" fontFamily="'DM Mono',monospace">{fK(v)}</text>
        </g>;})}
        <line x1={PL} y1={ys(loanAmount)} x2={W-PR} y2={ys(loanAmount)} stroke="#333350" strokeWidth="1" strokeDasharray="4,4"/>
        {line(history.map(h=>h.portfolioValue),"#c9a84c",false)}
        {line(history.map(h=>h.cumulativePaid),"#8898cc",true)}
        {history.map((h,i)=><g key={i}>
          <circle cx={xs(i)} cy={ys(h.portfolioValue)} r="3" fill="#c9a84c"/>
          <circle cx={xs(i)} cy={ys(h.cumulativePaid)} r="3" fill="#8898cc"/>
        </g>)}
        {history.map((h,i)=>{
          if(history.length>8&&i%Math.ceil(history.length/6)!==0&&i!==history.length-1) return null;
          return<text key={i} x={xs(i)} y={H-6} textAnchor="middle" fill="#444460" fontSize="9" fontFamily="'DM Mono',monospace">{h.date.slice(5)}</text>;
        })}
        {tip&&t&&<line x1={xs(tip.idx)} y1={PT} x2={xs(tip.idx)} y2={H-PB} stroke="#666688" strokeWidth="1" strokeDasharray="3,3"/>}
      </svg>
      {tip&&t&&(
        <div style={{position:"absolute",top:4,
          left:tip.isRight?undefined:tip.tipLeft+8,
          right:tip.isRight?(tip.svgW-tip.tipLeft+8):undefined,
          background:"#1a1a2e",border:"1px solid #2a2a4a",borderRadius:8,padding:"10px 14px",fontSize:12,pointerEvents:"none",minWidth:160}}>
          <div style={{color:"#666688",marginBottom:6,fontFamily:"'DM Mono',monospace",fontSize:10}}>{t.date}</div>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
            <span style={{width:10,height:2,background:"#c9a84c",display:"inline-block"}}/>
            <span style={{color:"#aaa8c0"}}>Portfolio</span>
            <span style={{color:"#c9a84c",fontFamily:"'DM Mono',monospace",marginLeft:"auto"}}>{fmt(t.portfolioValue)}</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{width:10,height:2,background:"#8898cc",display:"inline-block"}}/>
            <span style={{color:"#aaa8c0"}}>Repaid</span>
            <span style={{color:"#8898cc",fontFamily:"'DM Mono',monospace",marginLeft:"auto"}}>{fmt(t.cumulativePaid)}</span>
          </div>
          <div style={{marginTop:8,paddingTop:8,borderTop:"1px solid #2a2a4a",fontSize:11,color:t.portfolioValue<=t.cumulativePaid?"#60c080":"#e06060"}}>
            {t.portfolioValue<=t.cumulativePaid?"✓ Ahead":`Gap: ${fmt(t.portfolioValue-t.cumulativePaid)}`}
          </div>
        </div>
      )}
      <div style={{display:"flex",gap:20,marginTop:10,justifyContent:"center",flexWrap:"wrap"}}>
        {[["#c9a84c",false,"Portfolio if left invested"],["#8898cc",true,"Cumulative repaid"],["#333350",true,"Original loan total"]].map(([c,d,l])=>(
          <div key={l} style={{display:"flex",alignItems:"center",gap:6,fontSize:11,color:"#aaa8c0"}}>
            <svg width="20" height="8"><line x1="0" y1="4" x2="20" y2="4" stroke={c} strokeWidth="2" strokeDasharray={d?"5,3":"none"}/></svg>
            {l}
          </div>
        ))}
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const [state,      setState]     = useState(()=>load(STORAGE_KEY,DEFAULT));
  const [avKey,      setAvKey]     = useState(()=>localStorage.getItem(AV_KEY_STORE)||"");
  const [avKeyInput, setAvKeyInput]= useState("");
  const [market,     setMarket]    = useState(null);
  const [loading,    setLoading]   = useState(false);
  const [error,      setError]     = useState("");
  const [tab,        setTab]       = useState("dashboard");
  const [ledgerTab,  setLedgerTab] = useState("drawdowns");
  const [showSetup,  setShowSetup] = useState(false);
  const [lastFetched,setLastFetched]=useState(null);
  const [manualPrice,setManual]    = useState("");

  // Drawdown form
  const [ddAmt,  setDdAmt]  = useState("");
  const [ddDate, setDdDate] = useState(today());
  const [ddNote, setDdNote] = useState("");

  // Repayment form
  const [rpAmt,  setRpAmt]  = useState("");
  const [rpDate, setRpDate] = useState(today());

  const upd = patch => setState(s=>{const n={...s,...patch};save(STORAGE_KEY,n);return n;});

  const saveKey = () => {
    const k=avKeyInput.trim();
    if(!k){setError("Paste your Alpha Vantage key first");return;}
    localStorage.setItem(AV_KEY_STORE,k);
    setAvKey(k);setAvKeyInput("");setShowSetup(false);setError("");
  };

  // ── Core maths ──────────────────────────────────────────────────────────────
  const todayStr = useMemo(()=>today(),[]);
  const activeDrawdowns = useMemo(()=>(state.drawdowns||[]).filter(d=>d.date<=todayStr),[state.drawdowns,todayStr]);
  const futureDrawdowns = useMemo(()=>(state.drawdowns||[]).filter(d=>d.date>todayStr),[state.drawdowns,todayStr]);
  const totalDrawn    = useMemo(()=>activeDrawdowns.reduce((s,d)=>s+d.amount,0),[activeDrawdowns]);
  const totalFuture   = useMemo(()=>futureDrawdowns.reduce((s,d)=>s+d.amount,0),[futureDrawdowns]);
  const totalRepaid   = useMemo(()=>(state.repayments||[]).reduce((s,r)=>s+r.amount,0),[state.repayments]);
  const outstanding   = Math.max(totalDrawn - totalRepaid, 0);

  const r   = Math.pow(1+state.annualReturn/100,1/12)-1;
  const pmt = useMemo(()=>{
    if(totalDrawn<=0) return 0;
    const m=Math.max(state.months,1);
    if(r===0) return totalDrawn/m;
    return (totalDrawn*r)/(1-Math.pow(1+r,-m));
  },[totalDrawn,r,state.months]);

  const portfolioNow = (market?.changeFromBaseline!=null && totalDrawn>0)
    ? totalDrawn*(1+market.changeFromBaseline/100) : null;
  const netPos = portfolioNow!=null ? totalRepaid-portfolioNow : null;

  // ── Snapshot helper ─────────────────────────────────────────────────────────
  const addSnapshot=(spyPrice,baseline,repaidSoFar)=>{
    const portfolioValue=totalDrawn*(spyPrice/baseline);
    const filtered=(state.priceHistory||[]).filter(h=>h.date!==today());
    return[...filtered,{date:today(),spyPrice,portfolioValue,cumulativePaid:repaidSoFar}]
      .sort((a,b)=>a.date.localeCompare(b.date)).slice(-104);
  };

  // ── Market fetch ────────────────────────────────────────────────────────────
  const fetchMarket=async()=>{
    if(!avKey){setShowSetup(true);return;}
    setLoading(true);setError("");
    try{
      const parsed=await fetchAlphaVantage(avKey);
      const baseline=state.sp500Baseline||parsed.price;
      parsed.changeFromBaseline=((parsed.price-baseline)/baseline)*100;
      setMarket(parsed);
      setLastFetched(new Date().toLocaleTimeString("en-NZ",{hour:"2-digit",minute:"2-digit"}));
      const patch={};
      if(!state.sp500Baseline) patch.sp500Baseline=parsed.price;
      if(totalDrawn>0) patch.priceHistory=addSnapshot(parsed.price,baseline,totalRepaid);
      upd(patch);
    }catch(e){setError(e.message);}
    setLoading(false);
  };

  const applyManual=()=>{
    const p=parseFloat(manualPrice);
    if(!p||p<=0) return;
    const baseline=state.sp500Baseline||p;
    setMarket({price:p,changeToday:null,change1W:null,change1M:null,changeYTD:null,changeFromBaseline:((p-baseline)/baseline)*100,lastUpdated:"Manual entry",source:"Manual"});
    const patch={};
    if(!state.sp500Baseline) patch.sp500Baseline=p;
    if(totalDrawn>0) patch.priceHistory=addSnapshot(p,baseline,totalRepaid);
    upd(patch);setManual("");
  };

  // ── Drawdowns ───────────────────────────────────────────────────────────────
  const addDrawdown=()=>{
    const amt=parseFloat(ddAmt);
    if(!amt||amt<=0) return;
    const sorted=[...(state.drawdowns||[]),{id:Date.now(),date:ddDate,amount:amt,note:ddNote.trim()||"Sharesies withdrawal"}]
      .sort((a,b)=>a.date.localeCompare(b.date));
    upd({drawdowns:sorted});
    setDdAmt("");setDdNote("");
  };
  const delDrawdown=id=>upd({drawdowns:(state.drawdowns||[]).filter(d=>d.id!==id)});

  // ── Repayments ──────────────────────────────────────────────────────────────
  const addRepayment=()=>{
    const amt=parseFloat(rpAmt);
    if(!amt||amt<=0) return;
    const sorted=[...(state.repayments||[]),{id:Date.now(),date:rpDate,amount:amt}]
      .sort((a,b)=>a.date.localeCompare(b.date));
    upd({repayments:sorted});
    setRpAmt("");
  };
  const delRepayment=id=>upd({repayments:(state.repayments||[]).filter(r=>r.id!==id)});

  // ── Style helpers ───────────────────────────────────────────────────────────
  const inp =(ex={})=>({background:"#111118",border:"1px solid #333350",borderRadius:8,padding:"11px 14px",color:"#f0e8d8",fontSize:14,outline:"none",width:"100%",...ex});
  const btn =(ex={})=>({border:"1px solid #c9a84c66",borderRadius:8,background:"#c9a84c18",color:"#c9a84c",padding:"10px 18px",cursor:"pointer",fontSize:13,...ex});
  const card=(label,value,sub,color="#e8e0d0")=>(
    <div style={{background:"#1a1a2e",border:"1px solid #2a2a4a",borderRadius:10,padding:"16px 14px"}}>
      <div style={{fontSize:10,color:"#555570",textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:8}}>{label}</div>
      <div style={{fontSize:20,color,fontFamily:"'DM Mono',monospace",fontWeight:300}}>{value}</div>
      <div style={{fontSize:11,color:"#555570",marginTop:4}}>{sub}</div>
    </div>
  );

  const TABS=[["dashboard","Dashboard"],["chart","Chart"],["ledger","Ledger"],["settings","Settings"]];

  return(
    <div style={{minHeight:"100vh"}}>

      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#12122a,#1c1a2e)",borderBottom:"1px solid #2a2a4a",padding:"30px 24px 22px"}}>
        <div style={{maxWidth:760,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"flex-end",flexWrap:"wrap",gap:12}}>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
              <img src="inspiro-logo.png" alt="Inspiro Analytics" style={{height:36,width:36,borderRadius:6,objectFit:"cover"}}/>
              <div style={{fontSize:10,letterSpacing:"0.2em",color:"#8fa8c8",textTransform:"uppercase"}}>Inspiro Analytics</div>
            </div>
            <h1 style={{fontSize:26,fontWeight:400,color:"#f0e8d8"}}>Self-Loan Tracker</h1>
            <p style={{marginTop:6,fontSize:13,color:"#6668aa"}}>Track drawdowns and repayments against live market performance</p>
          </div>
          <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
            <button onClick={()=>setShowSetup(v=>!v)} style={{background:"none",border:`1px solid ${avKey?"#2a5a3a":"#c9a84c55"}`,borderRadius:8,color:avKey?"#60c080":"#c9a84c",padding:"7px 14px",cursor:"pointer",fontSize:11}}>
              {avKey?"✓ Free API Key Set":"⚙ Set Free API Key"}
            </button>
            {lastFetched&&<span style={{fontSize:10,color:"#333350"}}>Fetched {lastFetched}</span>}
          </div>
        </div>
      </div>

      {/* API Key Setup */}
      {showSetup&&(
        <div style={{background:"#13131f",borderBottom:"1px solid #2a2a4a",padding:"18px 24px"}} className="fade-in">
          <div style={{maxWidth:760,margin:"0 auto"}}>
            <p style={{fontSize:12,color:"#8888aa",marginBottom:4,lineHeight:1.7}}>
              <strong style={{color:"#c9a84c"}}>Free setup (2 min):</strong> Go to{" "}
              <a href="https://www.alphavantage.co/support/#api-key" target="_blank" style={{color:"#8898cc"}}>alphavantage.co/support/#api-key</a>,
              enter your email — free key, no credit card, 25 calls/day.
            </p>
            <div style={{display:"flex",gap:10,flexWrap:"wrap",marginTop:10}}>
              <input type="text" placeholder="Paste your Alpha Vantage API key…" value={avKeyInput}
                onChange={e=>setAvKeyInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveKey()}
                style={{...inp(),flex:1,minWidth:220,fontSize:13}}/>
              <button onClick={saveKey} style={btn()}>Save Key</button>
              {avKey&&<button onClick={()=>{localStorage.removeItem(AV_KEY_STORE);setAvKey("");}} style={btn({background:"none",border:"1px solid #e0606044",color:"#e06060"})}>Remove</button>}
            </div>
          </div>
        </div>
      )}

      {/* Tabs */}
      <div style={{borderBottom:"1px solid #2a2a4a",background:"#12122a",position:"sticky",top:0,zIndex:10}}>
        <div style={{maxWidth:760,margin:"0 auto",display:"flex"}}>
          {TABS.map(([id,label])=>(
            <button key={id} onClick={()=>{setTab(id);setError("");}} style={{
              background:"none",border:"none",padding:"14px 20px",cursor:"pointer",fontSize:13,
              color:tab===id?"#c9a84c":"#666688",
              borderBottom:tab===id?"2px solid #c9a84c":"2px solid transparent",marginBottom:-1,
            }}>{label}</button>
          ))}
        </div>
      </div>

      <div style={{maxWidth:760,margin:"0 auto",padding:"24px 20px 60px"}}>

        {/* ══ DASHBOARD ══ */}
        {tab==="dashboard"&&(
          <div className="fade-in">

            {/* Summary strip */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:futureDrawdowns.length>0?10:16}}>
              {[
                {label:"Active Drawdowns",  value:totalDrawn>0?fmt(totalDrawn):"—",   sub:`${activeDrawdowns.length} in effect today`,                                            color:"#e06060"},
                {label:"Total Repaid",      value:fmt(totalRepaid),  sub:`${(state.repayments||[]).length} payment${(state.repayments||[]).length!==1?"s":""}`,  color:"#60c080"},
                {label:"Outstanding",       value:totalDrawn>0?fmt(outstanding):"—",  sub:totalDrawn>0?`${((outstanding/totalDrawn)*100).toFixed(1)}% of active drawn`:"No active drawdowns yet", color:"#c9a84c"},
                {label:"Break-Even Monthly",value:totalDrawn>0?fmt(pmt):"—",  sub:totalDrawn>0?`at ${state.annualReturn}% p.a.`:"Increases as drawdowns activate",       color:"#8898cc"},
              ].map(({label,value,sub,color})=>(
                <div key={label} style={{background:"#1a1a2e",border:"1px solid #2a2a4a",borderRadius:10,padding:"14px 12px"}}>
                  <div style={{fontSize:10,color:"#555570",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:6}}>{label}</div>

                          <td style={{padding:"12px 14px",textAlign:"right",color:"#444460",fontSize:10,textTransform:"uppercase",letterSpacing:"0.1em"}}>Total</td>
                          <td style={{padding:"12px 14px",textAlign:"right",color:"#60c080",fontFamily:"'DM Mono',monospace"}}>{fmt(totalRepaid)}</td>
                          <td colSpan={3} style={{padding:"12px 14px",textAlign:"right",color:"#555570",fontSize:12}}>{(state.repayments||[]).length} payment{(state.repayments||[]).length!==1?"s":""}</td>
                        </tr>
                      </tfoot>
                    </table>
                  </div>
                )}
              </div>
            )}
          </div>
        )}

        {/* ══ SETTINGS ══ */}
        {tab==="settings"&&(
          <div className="fade-in">
            <div style={{background:"#1a1a2e",border:"1px solid #2a2a4a",borderRadius:12,padding:22,marginBottom:16}}>
              <div style={{fontSize:10,letterSpacing:"0.2em",color:"#c9a84c",textTransform:"uppercase",marginBottom:22}}>Loan Configuration</div>
              {[
                {label:"Target Annual Return %",  key:"annualReturn",type:"number",note:"Sharesies expected return — charge yourself this rate to break even"},
                {label:"Repayment Term (months)", key:"months",      type:"number",note:"How many months to repay over — break-even payment recalculates automatically"},
              ].map(({label,key,type,note})=>(
                <div key={key} style={{marginBottom:22}}>
                  <label style={{display:"block",fontSize:12,color:"#8888aa",marginBottom:3}}>{label}</label>
                  <div style={{fontSize:11,color:"#444460",marginBottom:8}}>{note}</div>
                  <input type={type} value={state[key]} onChange={e=>{ const v=parseFloat(e.target.value); if(!isNaN(v)&&v>0) upd({[key]:v}); }} style={{...inp(),maxWidth:200}}/>
                </div>
              ))}
              <div style={{background:"#111118",borderRadius:8,padding:"14px",fontSize:12,color:"#8888aa",lineHeight:1.7}}>
                <strong style={{color:"#c9a84c"}}>Note:</strong> Loan amount is now driven by your Drawdowns ledger — there's no fixed amount to set here. Add each withdrawal in the Ledger tab and the break-even payment updates automatically.
              </div>
            </div>

            <div style={{background:"#1a1a2e",border:"1px solid #2a2a4a",borderRadius:12,padding:22,marginBottom:16}}>
              <div style={{fontSize:10,letterSpacing:"0.2em",color:"#c9a84c",textTransform:"uppercase",marginBottom:14}}>S&P 500 Baseline</div>
              <p style={{fontSize:12,color:"#8888aa",marginBottom:14,lineHeight:1.7}}>
                Locked in on your first market refresh. All drift calculations compare current SPY price against this starting point.
              </p>
              <div style={{fontSize:24,color:"#c9a84c",fontFamily:"'DM Mono',monospace",fontWeight:300,marginBottom:14}}>
                {state.sp500Baseline?state.sp500Baseline.toLocaleString("en-US",{maximumFractionDigits:2}):"Not set yet"}
              </div>
              {state.sp500Baseline&&<button onClick={()=>upd({sp500Baseline:null})} style={btn({background:"none",border:"1px solid #e0606044",color:"#e06060",fontSize:11,padding:"7px 16px"})}>Reset baseline</button>}
            </div>

            <div style={{background:"#1a1a2e",border:"1px solid #2a2a4a",borderRadius:12,padding:22}}>
              <div style={{fontSize:10,letterSpacing:"0.2em",color:"#c9a84c",textTransform:"uppercase",marginBottom:6}}>Backup &amp; Restore</div>
              <p style={{fontSize:12,color:"#8888aa",marginBottom:16,lineHeight:1.7}}>
                Your data is stored under a permanent key that <strong style={{color:"#e8e0d0"}}>never changes between app updates</strong> — so any new version Claude gives you will find your data automatically. The only risk is clearing browser site data. Export a backup JSON occasionally and keep it in iCloud Drive or next to the HTML file as insurance.
                If you ever switch browsers or get a new Mac, use Import to restore everything instantly.
              </p>
              <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:20}}>
                <button onClick={()=>{
                  const data=JSON.stringify({...state, exportedAt:new Date().toISOString(), version:"slt-stable"}, null, 2);
                  const blob=new Blob([data],{type:"application/json"});
                  const url=URL.createObjectURL(blob);
                  const a=document.createElement("a");
                  a.href=url;
                  a.download=`self-loan-backup-${new Date().toISOString().slice(0,10)}.json`;
                  a.click();
                  URL.revokeObjectURL(url);
                  const toast=document.createElement("div");
                  toast.textContent="✓ Backup downloaded";
                  Object.assign(toast.style,{position:"fixed",bottom:"24px",right:"24px",background:"#1a3a2a",border:"1px solid #60c08066",color:"#60c080",padding:"10px 18px",borderRadius:"8px",fontSize:"13px",zIndex:9999,fontFamily:"Libre Baskerville,serif"});
                  document.body.appendChild(toast);
                  setTimeout(()=>toast.remove(),3000);
                }} style={btn({padding:"10px 18px"})}>
                  ⬇ Export Backup (JSON)
                </button>
                <label style={{...btn({padding:"10px 18px",cursor:"pointer"}), display:"inline-block"}}>
                  ⬆ Import Backup (JSON)
                  <input type="file" accept=".json" style={{display:"none"}} onChange={e=>{
                    const file=e.target.files[0]; if(!file) return;
                    const reader=new FileReader();
                    reader.onload=ev=>{
                      try{
                        const parsed=JSON.parse(ev.target.result);
                        if(!parsed.drawdowns||!parsed.repayments) throw new Error("Invalid backup — missing drawdowns or repayments fields");
                        if(window.confirm(`Import backup from ${parsed.exportedAt?.slice(0,10)||"unknown date"}?\n\nThis will replace all current data.`)){
                          const {exportedAt,version,...rest}=parsed;
                          if(rest.priceHistory) rest.priceHistory=rest.priceHistory.filter(h=>h.portfolioValue>0);
                          upd(rest);
                          setMarket(null);
                          alert("Data restored. Hit Refresh Market to reload live prices.");
                        }
                      }catch(err){ alert("Could not read backup: "+err.message); }
                    };
                    reader.readAsText(file);
                    e.target.value="";
                  }}/>
                </label>
              </div>
              <div style={{borderTop:"1px solid #1e1e32",paddingTop:16}}>
                <div style={{fontSize:10,letterSpacing:"0.2em",color:"#555570",textTransform:"uppercase",marginBottom:10}}>Current data summary</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,fontSize:12,color:"#8888aa"}}>
                  {[
                    ["Drawdowns",`${(state.drawdowns||[]).length} entries`],
                    ["Repayments",`${(state.repayments||[]).length} entries`],
                    ["Price snapshots",`${(state.priceHistory||[]).length} / 104`],
                    ["Baseline set",state.sp500Baseline?"Yes":"No"],
                  ].map(([k,v])=>(
                    <div key={k} style={{background:"#111118",borderRadius:6,padding:"8px 12px",display:"flex",justifyContent:"space-between"}}>
                      <span>{k}</span><span style={{color:"#c9a84c",fontFamily:"'DM Mono',monospace"}}>{v}</span>
                    </div>
                  ))}
                </div>
              </div>
              <div style={{marginTop:16,paddingTop:16,borderTop:"1px solid #1e1e32"}}>
                <button onClick={()=>{ if(window.confirm("Clear all price history snapshots? Drawdowns and repayments are kept.")) upd({priceHistory:[]}); }} style={btn({background:"none",border:"1px solid #e0606044",color:"#e06060",fontSize:11,padding:"7px 16px"})}>
                  Clear price history
                </button>
              </div>
            </div>
          </div>
        )}
      </div>

      <div style={{borderTop:"1px solid #1a1a2e",padding:"20px 24px 24px",textAlign:"center"}}>

        {/* Sharesies + BMC row */}
        <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:24,flexWrap:"wrap",marginBottom:14}}>

          {/* Sharesies referral */}
          <a href="https://www.sharesies.nz/referrals?token=eyJhbGciOiAiQTI1NktXIiwgImVuYyI6ICJBMjU2R0NNIn0.JtuPhNOGOpuzja1GEn0bPj7OLHgE6pMN5n6WXiTq4DWzrkYM8SM3ZQ.6h4X_9JWDAlv3zWV.XdORU6PfIQHTQzIBWCXCm4jndiqixDWyhZGH_8uYzSgjpHIlRZLyHW3dRVEZudAnCgPj0Gg55oWHWiP1snZr5FngUQSQGYxJN9-SAqNdSsMfaqvH2SpzDZ_LVrVZFtpUn-_qX0b2PRvVMz6m003dy6-txYyyMSdSu7OySl-OMH--KHeOTjOg-8HZEbSJMY4849S0i028TKHyLa2cjgiLHvhOb2h3PvUoWdU.9aMzxCzOGk1pH049R0ASuA"
            target="_blank" rel="noopener noreferrer"
            style={{display:"inline-flex",alignItems:"center",gap:7,fontSize:11,color:"#EF496F",textDecoration:"none",opacity:0.75,transition:"opacity 0.15s"}}
            onMouseEnter={e=>e.currentTarget.style.opacity=1}
            onMouseLeave={e=>e.currentTarget.style.opacity=0.75}>
            <span style={{width:16,height:16,borderRadius:4,background:"#EF496F",display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:"#fff",flexShrink:0}}>S</span>
            New to Sharesies? Sign up &amp; we both get a bonus ↗
          </a>

          <span style={{color:"#2a2a40",fontSize:11}}>·</span>

          {/* Buy Me a Coffee */}
          <div style={{display:"inline-flex",alignItems:"center",gap:10}}>
            <a href="https://buymeacoffee.com/inspiro"
              target="_blank" rel="noopener noreferrer"
              style={{display:"inline-flex",alignItems:"center",gap:7,fontSize:11,color:"#FFDD00",textDecoration:"none",opacity:0.75,transition:"opacity 0.15s"}}
              onMouseEnter={e=>e.currentTarget.style.opacity=1}
              onMouseLeave={e=>e.currentTarget.style.opacity=0.75}>
              <span style={{width:16,height:16,borderRadius:4,background:"#FFDD00",display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:10,flexShrink:0}}>☕</span>
              Buy me a coffee ↗
            </a>
            {/* QR code — useful on desktop so visitors can scan with phone */}
            <a href="https://buymeacoffee.com/inspiro" target="_blank" rel="noopener noreferrer"
              title="Scan to buy a coffee"
              style={{display:"inline-block",lineHeight:0,opacity:0.55,transition:"opacity 0.15s"}}
              onMouseEnter={e=>e.currentTarget.style.opacity=1}
              onMouseLeave={e=>e.currentTarget.style.opacity=0.55}>
              <img src="bmc_qr.png" alt="Buy me a coffee QR code"
                style={{width:44,height:44,borderRadius:4,display:"block"}}/>
            </a>
          </div>

        </div>

        <p style={{fontSize:10,color:"#222238"}}>Data stored locally · Free market data via Alpha Vantage · Not financial advice</p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
