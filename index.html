<script type="text/babel">
const { useState, useMemo, useRef, useEffect } = React;

// STABLE — never change between versions; user data persists automatically
const STORAGE_KEY  = "slt-loan-tracker";
const AV_KEY_STORE = "slt-av-key";
const LEGACY_KEYS  = ["slt-data-v6","slt-data-v5","slt-data-v4"];

const fmt    = n => (isNaN(n)||n==null)?"—":n.toLocaleString("en-NZ",{style:"currency",currency:"NZD",maximumFractionDigits:2});
const fmtPct = n => (isNaN(n)||n==null)?"—":`${n>=0?"+":""}${n.toFixed(2)}%`;
const sc     = v => (v==null||isNaN(v))?"#888":v>=0?"#60c080":"#e06060";
const today  = () => new Date().toISOString().slice(0,10);

const DEFAULT = {
  annualReturn: 8,
  months: 24,
  sp500Baseline: null,
  priceHistory: [],
  drawdowns: [],
  repayments: [],
};

function load(key,def){
  try{
    const r=localStorage.getItem(key);
    if(r) return JSON.parse(r);
    for(const lk of LEGACY_KEYS){
      const old=localStorage.getItem(lk);
      if(old){ const p=JSON.parse(old);
               if(p.priceHistory) p.priceHistory=p.priceHistory.filter(h=>h.portfolioValue>0);
               localStorage.setItem(key,JSON.stringify(p)); localStorage.removeItem(lk); return p; }
    }
    return def;
  }catch{return def;}
}
function save(key,val){
  try{localStorage.setItem(key,JSON.stringify(val));}
  catch(e){
    console.warn('[SLT] localStorage save failed — storage may be full:',e.message);
    if(!document.getElementById('slt-quota-warn')){
      const d=document.createElement('div');d.id='slt-quota-warn';
      Object.assign(d.style,{position:'fixed',top:'8px',left:'50%',transform:'translateX(-50%)',
        background:'#1a0e10',border:'1px solid #e0606088',color:'#e06060',
        padding:'10px 20px',borderRadius:'8px',fontSize:'12px',zIndex:'9999',
        fontFamily:"'Libre Baskerville',Georgia,serif",boxShadow:'0 4px 20px #00000066'});
      d.textContent='⚠ Data could not be saved — storage may be full. Export a backup now.';
      document.body.appendChild(d);setTimeout(()=>d.remove(),8000);
    }
  }
}

// ── Alpha Vantage ─────────────────────────────────────────────────────────────
async function fetchAlphaVantage(apiKey){
  const url=`https://www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol=SPY&outputsize=compact&apikey=${apiKey}`;
  const res=await fetch(url);
  if(!res.ok) throw new Error(`HTTP ${res.status} from Alpha Vantage`);
  const data=await res.json();
  if(data["Note"])          throw new Error("Rate limit reached — free tier: 25 calls/day.");
  if(data["Information"])   throw new Error(data["Information"]);
  if(data["Error Message"]) throw new Error(data["Error Message"]);
  const series=data["Time Series (Daily)"];
  if(!series) throw new Error("Keys in response: "+Object.keys(data).join(", "));
  const dates=Object.keys(series).sort((a,b)=>b.localeCompare(a));
  const gc=d=>parseFloat(series[d]["4. close"]);
  const price=gc(dates[0]);
  const thisYear=new Date().getFullYear().toString();
  const ytdStart=dates.filter(d=>d.startsWith(thisYear)).pop()||dates[dates.length-1];
  return{
    price,
    changeToday: dates.length>1  ? ((price-gc(dates[1]))/gc(dates[1]))*100 : null,
    change1W:    dates.length>5  ? ((price-gc(dates[Math.min(5,dates.length-1)]))/gc(dates[Math.min(5,dates.length-1)]))*100 : null,
    change1M:    dates.length>22 ? ((price-gc(dates[Math.min(22,dates.length-1)]))/gc(dates[Math.min(22,dates.length-1)]))*100 : null,
    changeYTD:  ((price-gc(ytdStart))/gc(ytdStart))*100,
    lastUpdated:new Date(dates[0]).toLocaleDateString("en-NZ",{day:"numeric",month:"short",year:"numeric"}),
    source:"Alpha Vantage (SPY)"
  };
}

// ── SVG Line Chart ─────────────────────────────────────────────────────────────
function LineChart({history,loanAmount}){
  const [tip,setTip]=useState(null);
  const svgRef=useRef(null);
  const rectRef=useRef(null);
  useEffect(()=>{
    const update=()=>{if(svgRef.current) rectRef.current=svgRef.current.getBoundingClientRect();};
    update();
    window.addEventListener('resize',update);
    return()=>window.removeEventListener('resize',update);
  },[history]);

  // ── Empty state illustration ──
  if(!history||history.length<2) return(
    <div style={{padding:"32px 20px 20px",textAlign:"center"}}>
      {/* Mini SVG illustration */}
      <svg viewBox="0 0 280 120" style={{width:"100%",maxWidth:280,height:"auto",marginBottom:20,opacity:0.55}}>
        {/* Grid lines */}
        {[0,1,2,3].map(i=>(
          <line key={i} x1="30" y1={20+i*22} x2="260" y2={20+i*22} stroke="#1e1e32" strokeWidth="1"/>
        ))}
        {/* Dotted future portfolio line (gold) */}
        <polyline points="30,90 80,72 130,55 180,38 230,24 260,18"
          fill="none" stroke="#c9a84c" strokeWidth="2" strokeDasharray="5,4"
          strokeLinecap="round" strokeLinejoin="round" opacity="0.5"/>
        {/* Dotted future repayment line (blue) */}
        <polyline points="30,90 80,80 130,68 180,57 230,46 260,40"
          fill="none" stroke="#8898cc" strokeWidth="2" strokeDasharray="5,4"
          strokeLinecap="round" strokeLinejoin="round" opacity="0.5"/>
        {/* Single starting dot */}
        <circle cx="30" cy="90" r="4" fill="#c9a84c" opacity="0.6"/>
        <circle cx="30" cy="90" r="4" fill="#8898cc" opacity="0.4"/>
        {/* Label arrows */}
        <text x="180" y="32" fill="#c9a84c" fontSize="9" opacity="0.7" fontFamily="'DM Mono',monospace">portfolio growth</text>
        <text x="180" y="52" fill="#8898cc" fontSize="9" opacity="0.7" fontFamily="'DM Mono',monospace">your repayments</text>
      </svg>
      <div style={{fontSize:13,color:"#555570",marginBottom:6}}>Chart builds as you go</div>
      <p style={{fontSize:12,color:"#3a3a58",lineHeight:1.7,maxWidth:320,margin:"0 auto"}}>
        Two lines will appear here: the gold line tracks what your withdrawals would be worth if left invested, and the blue line tracks your cumulative repayments. When they meet, you've broken even.
      </p>
      <p style={{fontSize:11,color:"#333350",marginTop:12}}>
        Refresh market data twice to see your first data points.
      </p>
    </div>
  );

  const W=680,H=220,PL=64,PR=20,PT=16,PB=36;
  const iW=W-PL-PR,iH=H-PT-PB;
  const allV=[...history.map(h=>h.portfolioValue),...history.map(h=>h.cumulativePaid),loanAmount];
  const minV=Math.min(...allV)*0.97, maxV=Math.max(...allV)*1.03;
  const xs=i=>PL+(i/(history.length-1))*iW;
  const ys=v=>PT+iH-((v-minV)/(maxV-minV))*iH;
  const line=(arr,color,dash)=>{
    const d=arr.map((v,i)=>`${i===0?"M":"L"}${xs(i).toFixed(1)},${ys(v).toFixed(1)}`).join(" ");
    return<path d={d} fill="none" stroke={color} strokeWidth="2" strokeDasharray={dash?"6,4":"none"} strokeLinecap="round" strokeLinejoin="round"/>;
  };
  const fK=v=>v>=1000?`$${(v/1000).toFixed(1)}k`:`$${v.toFixed(0)}`;
  const onMove=e=>{
    const svg=svgRef.current; if(!svg) return;
    const rect=rectRef.current||svg.getBoundingClientRect();
    const x=(e.clientX-rect.left)*(W/rect.width)-PL;
    const idx=Math.max(0,Math.min(history.length-1,Math.round((x/iW)*(history.length-1))));
    const svgW=rect.width;
    const tipLeft=xs(idx)/W*svgW;
    const isRight=idx>history.length*0.6;
    setTip({idx,tipLeft,svgW,isRight});
  };
  const t=tip?history[tip.idx]:null;
  return(
    <div style={{position:"relative"}}>
      <svg ref={svgRef} viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto",cursor:"crosshair"}}
        onMouseMove={onMove} onMouseLeave={()=>setTip(null)}>
        {[0,1,2,3,4].map(i=>{const v=minV+(i/4)*(maxV-minV);const y=ys(v);return<g key={i}>
          <line x1={PL} y1={y} x2={W-PR} y2={y} stroke="#1e1e32" strokeWidth="1"/>
          <text x={PL-6} y={y+4} textAnchor="end" fill="#444460" fontSize="10" fontFamily="'DM Mono',monospace">{fK(v)}</text>
        </g>;})}
        <line x1={PL} y1={ys(loanAmount)} x2={W-PR} y2={ys(loanAmount)} stroke="#333350" strokeWidth="1" strokeDasharray="4,4"/>
        {line(history.map(h=>h.portfolioValue),"#c9a84c",false)}
        {line(history.map(h=>h.cumulativePaid),"#8898cc",true)}
        {history.map((h,i)=><g key={i}>
          <circle cx={xs(i)} cy={ys(h.portfolioValue)} r="3" fill="#c9a84c"/>
          <circle cx={xs(i)} cy={ys(h.cumulativePaid)} r="3" fill="#8898cc"/>
        </g>)}
        {history.map((h,i)=>{
          if(history.length>8&&i%Math.ceil(history.length/6)!==0&&i!==history.length-1) return null;
          return<text key={i} x={xs(i)} y={H-6} textAnchor="middle" fill="#444460" fontSize="9" fontFamily="'DM Mono',monospace">{h.date.slice(5)}</text>;
        })}
        {tip&&t&&<line x1={xs(tip.idx)} y1={PT} x2={xs(tip.idx)} y2={H-PB} stroke="#666688" strokeWidth="1" strokeDasharray="3,3"/>}
      </svg>
      {tip&&t&&(
        <div style={{position:"absolute",top:4,
          left:tip.isRight?undefined:tip.tipLeft+8,
          right:tip.isRight?(tip.svgW-tip.tipLeft+8):undefined,
          background:"#1a1a2e",border:"1px solid #2a2a4a",borderRadius:8,padding:"10px 14px",fontSize:12,pointerEvents:"none",minWidth:160}}>
          <div style={{color:"#666688",marginBottom:6,fontFamily:"'DM Mono',monospace",fontSize:10}}>{t.date}</div>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
            <span style={{width:10,height:2,background:"#c9a84c",display:"inline-block"}}/>
            <span style={{color:"#aaa8c0"}}>Portfolio</span>
            <span style={{color:"#c9a84c",fontFamily:"'DM Mono',monospace",marginLeft:"auto"}}>{fmt(t.portfolioValue)}</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{width:10,height:2,background:"#8898cc",display:"inline-block"}}/>
            <span style={{color:"#aaa8c0"}}>Repaid</span>
            <span style={{color:"#8898cc",fontFamily:"'DM Mono',monospace",marginLeft:"auto"}}>{fmt(t.cumulativePaid)}</span>
          </div>
          <div style={{marginTop:8,paddingTop:8,borderTop:"1px solid #2a2a4a",fontSize:11,color:t.portfolioValue<=t.cumulativePaid?"#60c080":"#e06060"}}>
            {t.portfolioValue<=t.cumulativePaid?"✓ Ahead":`Gap: ${fmt(t.portfolioValue-t.cumulativePaid)}`}
          </div>
        </div>
      )}
      <div style={{display:"flex",gap:20,marginTop:10,justifyContent:"center",flexWrap:"wrap"}}>
        {[["#c9a84c",false,"Portfolio if left invested"],["#8898cc",true,"Cumulative repaid"],["#333350",true,"Original loan total"]].map(([c,d,l])=>(
          <div key={l} style={{display:"flex",alignItems:"center",gap:6,fontSize:11,color:"#aaa8c0"}}>
            <svg width="20" height="8"><line x1="0" y1="4" x2="20" y2="4" stroke={c} strokeWidth="2" strokeDasharray={d?"5,3":"none"}/></svg>
            {l}
          </div>
        ))}
      </div>
    </div>
  );
}

// ── FAQ Accordion ─────────────────────────────────────────────────────────────
const FAQ_SECTIONS = [
  {
    title: "The Basics",
    icon: "◈",
    items: [
      {
        q: "What is a self-loan?",
        a: "A self-loan is when you withdraw money from your own investment portfolio to spend on something — and then commit to paying it back. Instead of selling investments permanently, you treat the withdrawal as a personal loan to yourself, with a repayment schedule that lets your portfolio stay invested (in theory) while you cover the expense."
      },
      {
        q: "What's the difference between a drawdown and a repayment?",
        a: "A drawdown is money you take OUT of your investment fund — each withdrawal you log in the Ledger tab. A repayment is money you put BACK — each deposit you make toward paying the loan off. The tracker compares your cumulative repayments against what your withdrawals would be worth if you'd left them invested the whole time."
      },
      {
        q: "What does 'Break-Even Monthly' mean?",
        a: "Break-Even Monthly is the minimum repayment you'd need to make each month so that, over your chosen term, your total repayments match the expected growth of your original investment. It uses the standard loan amortisation formula applied to your target annual return rate. If you pay this amount every month, you'll have repaid the full opportunity cost of the withdrawal by the end of the term."
      },
      {
        q: "What does 'Net Position' mean?",
        a: "Net Position compares how much you've actually repaid against what your withdrawals are worth today at current market prices. A green figure means you've repaid more than the current portfolio value — you're ahead. A red figure shows the gap still to close. It's not about the original dollar amount withdrawn; it's about whether your repayments have caught up to what leaving the money invested would have produced."
      },
    ]
  },
  {
    title: "Getting Started",
    icon: "◉",
    items: [
      {
        q: "How do I log my first withdrawal?",
        a: "Go to the Ledger tab, make sure you're on the Drawdowns sub-tab, enter the amount and the date it occurred, add an optional note (e.g. 'Holiday flights'), then tap Add Drawdown. The Dashboard will immediately update your outstanding balance and break-even payment."
      },
      {

        a: "Yes. When adding a drawdown, set the date to a future date. It will appear in the Ledger with a 'scheduled' label and show up in the upcoming banner on the Dashboard, but it won't count toward your active balance or break-even calculation until that date arrives."

      },
    ]
  },
  {
    title: "The Numbers",
    icon: "◇",
    items: [
      {
        q: "Which annual return rate should I use?",
        a: "The default is 8%, which is a commonly cited long-run average real return for a broad market index fund. You can adjust this in the Settings tab. A higher rate makes the break-even payment larger (you're charging yourself more for the opportunity cost). Use whatever rate reflects your own expectations for your portfolio's long-term performance."
      },
      {
        q: "Why does the chart need at least 2 market refreshes to appear?",
        a: "The chart plots your portfolio value over time using saved price snapshots. Each time you refresh the market (or enter a manual price), a snapshot is saved for that day. You need at least two distinct data points to draw a line — so the chart appears from your second refresh onward. Snapshots are stored up to 104 entries (roughly two years of weekly refreshes)."
      },
      {
        q: "How is 'Portfolio Value (if left in)' calculated?",
        a: "It takes your total active drawdown amount and multiplies it by the ratio of the current index price to your baseline price (set on your first refresh). For example: if you withdrew $5,000 when the index was at $500, and it's now $550, the portfolio value would be $5,000 × (550 ÷ 500) = $5,500. This shows what that money would be worth today had you never withdrawn it."
      },
      {
        q: "What's the difference between 'Outstanding' and 'Net Position'?",
        a: "Outstanding is simple arithmetic: total drawn minus total repaid. It tells you how much of the original dollar amount you still owe yourself. Net Position is market-adjusted: it compares your repayments against the current market value of what you withdrew. Outstanding ignores market movement; Net Position reflects whether you've kept pace with the market's growth since your first withdrawal."
      },
    ]
  },
  {
    title: "Your Data",
    icon: "◎",
    items: [
      {
        q: "Where is my data stored? Is it sent anywhere?",
        a: "All your data — drawdowns, repayments, price history, and settings — is stored exclusively in your browser's localStorage under the key 'slt-loan-tracker'. Nothing is sent to any server. The app code is hosted on GitHub Pages as static files; there is no backend, no database, and no account. Your data never leaves your device."
      },
      {
        q: "Will updating index.html delete my data?",
        a: "No. Your data is stored in the browser independently of the app files. As long as the storage key 'slt-loan-tracker' remains unchanged (and it always will — this is intentional), any new version of the app will find your existing data automatically. Updating the HTML file on GitHub simply replaces the code; it has no effect on what's stored in localStorage."
      },
      {
        q: "How do I export a backup?",
        a: "Go to the Settings tab and tap 'Export Backup (JSON)'. This downloads a timestamped JSON file containing all your drawdowns, repayments, price history, and settings. Store it somewhere safe — iCloud Drive, Google Drive, or alongside your index.html file. To restore, use 'Import Backup (JSON)' on the same page."
      },
      {
        q: "Will clearing my browser cache or site data delete my data?",
        a: "Yes — if you clear site data for the domain where the app is hosted, localStorage is erased along with it. Clearing your browser cache alone (just cached files) does not affect localStorage. The risk comes from 'Clear site data' or 'Remove all data for this site' actions in browser settings. This is why the Settings tab recommends exporting a backup regularly."
      },
    ]
  },
];

                      color: "#c9a84c",

                      fontWeight: 300,
                      flexShrink: 0,
                      width: 24,
                      height: 24,
                      display: "flex",
                      alignItems: "center",
                      justifyContent: "center",
                      transform: open ? "rotate(45deg)" : "rotate(0deg)",
                      transition: "transform 0.25s ease",
                      lineHeight: 1,
                      fontFamily: "'DM Mono', monospace",

      <div style={{

        color: "#444460",

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const [state,      setState]     = useState(()=>load(STORAGE_KEY,DEFAULT));
  const [avKey,      setAvKey]     = useState(()=>localStorage.getItem(AV_KEY_STORE)||"");
  const [avKeyInput, setAvKeyInput]= useState("");
  const [market,     setMarket]    = useState(null);
  const [loading,    setLoading]   = useState(false);
  const [error,      setError]     = useState("");
  const [tab,        setTab]       = useState("dashboard");
  const [ledgerTab,  setLedgerTab] = useState("drawdowns");
  const [showSetup,  setShowSetup] = useState(false);
  const [lastFetched,setLastFetched]=useState(null);
  const [manualPrice,setManual]    = useState("");

  // Drawdown form
  const [ddAmt,  setDdAmt]  = useState("");
  const [ddDate, setDdDate] = useState(today());
  const [ddNote, setDdNote] = useState("");

  // Repayment form
  const [rpAmt,  setRpAmt]  = useState("");
  const [rpDate, setRpDate] = useState(today());

  const upd = patch => setState(s=>{const n={...s,...patch};save(STORAGE_KEY,n);return n;});

  const saveKey = () => {
    const k=avKeyInput.trim();
    if(!k){setError("Paste your Alpha Vantage key first");return;}
    localStorage.setItem(AV_KEY_STORE,k);
    setAvKey(k);setAvKeyInput("");setShowSetup(false);setError("");
  };

  // ── Core maths ──────────────────────────────────────────────────────────────
  const todayStr = useMemo(()=>today(),[]);
  const activeDrawdowns = useMemo(()=>(state.drawdowns||[]).filter(d=>d.date<=todayStr),[state.drawdowns,todayStr]);
  const futureDrawdowns = useMemo(()=>(state.drawdowns||[]).filter(d=>d.date>todayStr),[state.drawdowns,todayStr]);
  const totalDrawn    = useMemo(()=>activeDrawdowns.reduce((s,d)=>s+d.amount,0),[activeDrawdowns]);
  const totalFuture   = useMemo(()=>futureDrawdowns.reduce((s,d)=>s+d.amount,0),[futureDrawdowns]);
  const totalRepaid   = useMemo(()=>(state.repayments||[]).reduce((s,r)=>s+r.amount,0),[state.repayments]);
  const outstanding   = Math.max(totalDrawn - totalRepaid, 0);

  const r   = Math.pow(1+state.annualReturn/100,1/12)-1;
  const pmt = useMemo(()=>{
    if(totalDrawn<=0) return 0;
    const m=Math.max(state.months,1);
    if(r===0) return totalDrawn/m;
    return (totalDrawn*r)/(1-Math.pow(1+r,-m));
  },[totalDrawn,r,state.months]);

  const portfolioNow = (market?.changeFromBaseline!=null && totalDrawn>0)
    ? totalDrawn*(1+market.changeFromBaseline/100) : null;
  const netPos = portfolioNow!=null ? totalRepaid-portfolioNow : null;

  // Onboarding: show welcome if no drawdowns AND no baseline
  const showWelcome = (state.drawdowns||[]).length===0 && !state.sp500Baseline;

  // ── Snapshot helper ─────────────────────────────────────────────────────────
  const addSnapshot=(spyPrice,baseline,repaidSoFar)=>{
    const portfolioValue=totalDrawn*(spyPrice/baseline);
    const filtered=(state.priceHistory||[]).filter(h=>h.date!==today());
    return[...filtered,{date:today(),spyPrice,portfolioValue,cumulativePaid:repaidSoFar}]
      .sort((a,b)=>a.date.localeCompare(b.date)).slice(-104);
  };

  // ── Market fetch ────────────────────────────────────────────────────────────
  const fetchMarket=async()=>{
    if(!avKey){setShowSetup(true);return;}
    setLoading(true);setError("");
    try{
      const parsed=await fetchAlphaVantage(avKey);
      const baseline=state.sp500Baseline||parsed.price;
      parsed.changeFromBaseline=((parsed.price-baseline)/baseline)*100;
      setMarket(parsed);
      setLastFetched(new Date().toLocaleTimeString("en-NZ",{hour:"2-digit",minute:"2-digit"}));
      const patch={};
      if(!state.sp500Baseline) patch.sp500Baseline=parsed.price;
      if(totalDrawn>0) patch.priceHistory=addSnapshot(parsed.price,baseline,totalRepaid);
      upd(patch);
    }catch(e){setError(e.message);}
    setLoading(false);
  };

  const applyManual=()=>{
    const p=parseFloat(manualPrice);
    if(!p||p<=0||p>100000){setManual("");return;}
    const baseline=state.sp500Baseline||p;
    setMarket({price:p,changeToday:null,change1W:null,change1M:null,changeYTD:null,changeFromBaseline:((p-baseline)/baseline)*100,lastUpdated:"Manual entry",source:"Manual"});
    const patch={};
    if(!state.sp500Baseline) patch.sp500Baseline=p;
    if(totalDrawn>0) patch.priceHistory=addSnapshot(p,baseline,totalRepaid);
    upd(patch);setManual("");
  };

  // ── Drawdowns ───────────────────────────────────────────────────────────────
  const addDrawdown=()=>{
    const amt=parseFloat(ddAmt);
    if(!amt||amt<=0) return;
    const sorted=[...(state.drawdowns||[]),{id:Date.now(),date:ddDate,amount:amt,note:ddNote.trim()||"Investment fund withdrawal"}]
      .sort((a,b)=>a.date.localeCompare(b.date));
    upd({drawdowns:sorted});
    setDdAmt("");setDdNote("");
  };
  const delDrawdown=id=>upd({drawdowns:(state.drawdowns||[]).filter(d=>d.id!==id)});

  // ── Repayments ──────────────────────────────────────────────────────────────
  const addRepayment=()=>{
    const amt=parseFloat(rpAmt);
    if(!amt||amt<=0) return;
    const sorted=[...(state.repayments||[]),{id:Date.now(),date:rpDate,amount:amt}]
      .sort((a,b)=>a.date.localeCompare(b.date));
    upd({repayments:sorted});
    setRpAmt("");
  };
  const delRepayment=id=>upd({repayments:(state.repayments||[]).filter(r=>r.id!==id)});

  // ── Style helpers ───────────────────────────────────────────────────────────
  const inp =(ex={})=>({background:"#111118",border:"1px solid #333350",borderRadius:8,padding:"11px 14px",color:"#f0e8d8",fontSize:14,outline:"none",width:"100%",...ex});
  const btn =(ex={})=>({border:"1px solid #c9a84c66",borderRadius:8,background:"#c9a84c18",color:"#c9a84c",padding:"10px 18px",cursor:"pointer",fontSize:13,...ex});

  const TABS=[["dashboard","Dashboard"],["chart","Chart"],["ledger","Ledger"],["settings","Settings"],["faq","FAQ"]];

  return(
    <div style={{minHeight:"100vh"}}>

      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#12122a,#1c1a2e)",borderBottom:"1px solid #2a2a4a",padding:"30px 24px 22px"}}>
        <div style={{maxWidth:760,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"flex-end",flexWrap:"wrap",gap:12}}>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
              <img src="inspiro-logo.png" alt=""
                style={{height:36,width:36,borderRadius:6,objectFit:"cover"}}
                onError={e=>{e.currentTarget.style.display='none';}}/>
              <div style={{fontSize:10,letterSpacing:"0.2em",color:"#8fa8c8",textTransform:"uppercase"}}>Inspiro</div>
            </div>
            <h1 style={{fontSize:26,fontWeight:400,color:"#f0e8d8"}}>Self-Loan Tracker</h1>
            <p style={{marginTop:6,fontSize:13,color:"#6668aa"}}>Track drawdowns and repayments against live investment fund performance</p>
          </div>
          <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
            <button onClick={()=>setShowSetup(v=>!v)} style={{background:"none",border:`1px solid ${avKey?"#2a5a3a":"#c9a84c55"}`,borderRadius:8,color:avKey?"#60c080":"#c9a84c",padding:"7px 14px",cursor:"pointer",fontSize:11}}>
              {avKey?"✓ Free API Key Set":"⚙ Set Free API Key"}
            </button>
            {lastFetched&&<span style={{fontSize:10,color:"#333350"}}>Fetched {lastFetched}</span>}
          </div>
        </div>
      </div>

      {/* API Key Setup */}
      {showSetup&&(
        <div style={{background:"#13131f",borderBottom:"1px solid #2a2a4a",padding:"18px 24px"}} className="fade-in">
          <div style={{maxWidth:760,margin:"0 auto"}}>
            <p style={{fontSize:12,color:"#8888aa",marginBottom:4,lineHeight:1.7}}>
              <strong style={{color:"#c9a84c"}}>Free setup (2 min):</strong> Go to{" "}
              <a href="https://www.alphavantage.co/support/#api-key" target="_blank" style={{color:"#8898cc"}}>alphavantage.co/support/#api-key</a>,
              enter your email — free key, no credit card, 25 calls/day.
            </p>
            <div style={{display:"flex",gap:10,flexWrap:"wrap",marginTop:10}}>
              <input type="text" placeholder="Paste your Alpha Vantage API key…" value={avKeyInput}
                onChange={e=>setAvKeyInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveKey()}
                style={{...inp(),flex:1,minWidth:220,fontSize:13}}/>
              <button onClick={saveKey} style={btn()}>Save Key</button>
              {avKey&&<button onClick={()=>{localStorage.removeItem(AV_KEY_STORE);setAvKey("");}} style={btn({background:"none",border:"1px solid #e0606044",color:"#e06060"})}>Remove</button>}
            </div>
          </div>
        </div>
      )}

      {/* Tabs */}
      <div style={{borderBottom:"1px solid #2a2a4a",background:"#12122a",position:"sticky",top:0,zIndex:10}}>
        <div style={{maxWidth:760,margin:"0 auto",display:"flex"}}>
          {TABS.map(([id,label])=>(
            <button key={id} onClick={()=>{setTab(id);setError("");}} style={{
              background:"none",border:"none",padding:"14px 20px",cursor:"pointer",fontSize:13,
              color:tab===id?"#c9a84c":"#666688",
              borderBottom:tab===id?"2px solid #c9a84c":"2px solid transparent",marginBottom:-1,
            }}>{label}</button>
          ))}
        </div>
      </div>

      <div style={{maxWidth:760,margin:"0 auto",padding:"24px 20px 60px"}}>

        {/* ══ DASHBOARD ══ */}
        {tab==="dashboard"&&(
          <>
            {/* Welcome / onboarding screen */}
            {showWelcome ? (
              <WelcomeScreen
                onGoToLedger={()=>setTab("ledger")}
                onGoToSettings={()=>setTab("settings")}
              />
            ) : (
          <div className="fade-in">

            {/* Summary strip */}
            <div className="summary-grid" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:futureDrawdowns.length>0?10:16}}>
              {[
                {label:"Active Drawdowns",  value:totalDrawn>0?fmt(totalDrawn):"—",   sub:`${activeDrawdowns.length} in effect today`,                                            color:"#e06060"},
                {label:"Total Repaid",      value:fmt(totalRepaid),  sub:`${(state.repayments||[]).length} payment${(state.repayments||[]).length!==1?"s":""}`,  color:"#60c080"},
                {label:"Outstanding",       value:totalDrawn>0?fmt(outstanding):"—",  sub:totalDrawn>0?`${((outstanding/totalDrawn)*100).toFixed(1)}% of active drawn`:"No active drawdowns yet", color:"#c9a84c"},
                {label:"Break-Even Monthly",value:totalDrawn>0?fmt(pmt):"—",  sub:totalDrawn>0?`at ${state.annualReturn}% p.a.`:"Increases as drawdowns activate",       color:"#8898cc"},
              ].map(({label,value,sub,color})=>(
                <div key={label} style={{background:"#1a1a2e",border:"1px solid #2a2a4a",borderRadius:10,padding:"14px 12px"}}>
                  <div style={{fontSize:10,color:"#555570",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:6}}>{label}</div>
                  <div style={{fontSize:18,color,fontFamily:"'DM Mono',monospace",fontWeight:300}}>{value}</div>
                  <div style={{fontSize:11,color:"#555570",marginTop:4}}>{sub}</div>
                </div>
              ))}
            </div>

            {/* Upcoming drawdowns banner */}
            {futureDrawdowns.length>0&&(
              <div style={{background:"#161622",border:"1px solid #c9a84c33",borderRadius:10,padding:"12px 16px",marginBottom:16}}>
                <div style={{fontSize:10,color:"#c9a84c",textTransform:"uppercase",letterSpacing:"0.15em",marginBottom:8}}>
                  Scheduled — not yet active
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {futureDrawdowns.map(d=>(
                    <div key={d.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:12,flexWrap:"wrap",gap:4}}>
                      <span style={{color:"#8888aa",fontFamily:"'DM Mono',monospace"}}>{d.date}</span>
                      <span style={{color:"#aaa8c0",flex:1,paddingLeft:12}}>{d.note}</span>
                      <span style={{color:"#c9a84c",fontFamily:"'DM Mono',monospace"}}>{fmt(d.amount)}</span>
                    </div>
                  ))}
                  <div style={{borderTop:"1px solid #2a2a3a",marginTop:4,paddingTop:8,display:"flex",justifyContent:"space-between",fontSize:12}}>
                    <span style={{color:"#555570"}}>Total scheduled</span>
                    <span style={{color:"#c9a84c",fontFamily:"'DM Mono',monospace"}}>{fmt(totalFuture)}</span>
                  </div>
                </div>
              </div>
            )}

            {/* Market card */}
            <div style={{background:"#1a1a2e",border:"1px solid #2a2a4a",borderRadius:12,padding:22,marginBottom:16}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18,flexWrap:"wrap",gap:10}}>
                <div style={{fontSize:10,letterSpacing:"0.2em",color:"#c9a84c",textTransform:"uppercase"}}>
                  Investment Index{market?.source?` · ${market.source}`:""}
                </div>
                <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                  {/* Manual price always visible */}
                  <div style={{display:"flex",gap:6,alignItems:"center"}}>
                    <input type="number" placeholder="Manual price" value={manualPrice}
                      onChange={e=>setManual(e.target.value)}
                      onKeyDown={e=>e.key==="Enter"&&applyManual()}
                      style={{...inp(),width:130,padding:"7px 12px",fontSize:12}}/>
                    <button onClick={applyManual} style={btn({padding:"7px 12px",fontSize:12})}>Apply</button>
                  </div>
                  <button onClick={fetchMarket} disabled={loading} style={btn({background:loading?"#2a2a4a":"#c9a84c18",color:loading?"#888":"#c9a84c",cursor:loading?"not-allowed":"pointer"})}>
                    {loading?"⟳ Fetching…":"↻ Refresh"}
                  </button>
                </div>
              </div>

              {error&&!showSetup&&<div style={{background:"#1a0e10",border:"1px solid #e0606033",borderRadius:8,padding:"12px 14px",marginBottom:14,fontSize:12,color:"#e06060"}}>⚠ {error}</div>}

              {!market&&!loading&&(
                <div>
                  <div style={{textAlign:"center",padding:"12px 0 8px",color:"#444460",fontSize:13}}>
                    {avKey?"Hit Refresh to pull live data — or enter a price manually above.":"Set a free API key for live data, or enter the index price manually above."}
                  </div>
                  <p style={{textAlign:"center",fontSize:11,color:"#333350",marginTop:4}}>Find current SPY price at <a href="https://finance.yahoo.com/quote/SPY" target="_blank" style={{color:"#8898cc"}}>finance.yahoo.com</a></p>
                </div>
              )}

              {market&&(
                <div className="fade-in">
                  <div style={{display:"flex",alignItems:"baseline",gap:14,marginBottom:6}}>
                    <span style={{fontSize:42,fontWeight:300,color:"#f0e8d8",fontFamily:"'DM Mono',monospace",letterSpacing:"-0.02em"}}>
                      {market.price?.toLocaleString("en-US",{maximumFractionDigits:2})}
                    </span>
                    {market.changeToday!=null&&<span style={{fontSize:17,color:sc(market.changeToday)}}>{fmtPct(market.changeToday)} today</span>}
                  </div>
                  <div style={{fontSize:11,color:"#444460",marginBottom:16}}>Last updated: {market.lastUpdated}</div>
                  {market.change1W!=null&&(
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:14}}>
                      {[["1 Week",market.change1W],["1 Month",market.change1M],["YTD",market.changeYTD]].map(([l,v])=>(
                        <div key={l} style={{background:"#111118",borderRadius:8,padding:"12px 10px",textAlign:"center"}}>
                          <div style={{fontSize:10,color:"#444460",marginBottom:5,textTransform:"uppercase",letterSpacing:"0.1em"}}>{l}</div>
                          <div style={{fontSize:16,color:sc(v),fontFamily:"'DM Mono',monospace",fontWeight:300}}>{fmtPct(v)}</div>
                        </div>
                      ))}
                    </div>
                  )}

                Your data is stored under a permanent key that <strong style={{color:"#e8e0d0"}}>never changes between app updates</strong> — so any new version will find your data automatically. The only risk is clearing browser site data. Export a backup JSON occasionally and keep it in iCloud Drive or next to the HTML file as insurance.
                If you ever switch browsers or get a new device, use Import to restore everything instantly.
              </p>
              <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:20}}>
                <button onClick={()=>{
                  const data=JSON.stringify({...state, exportedAt:new Date().toISOString(), version:"slt-stable"}, null, 2);
                  const blob=new Blob([data],{type:"application/json"});
                  const url=URL.createObjectURL(blob);
                  const a=document.createElement("a");
                  a.href=url;
                  a.download=`self-loan-backup-${new Date().toISOString().slice(0,10)}.json`;
                  a.click();
                  URL.revokeObjectURL(url);
                  const toast=document.createElement("div");
                  toast.textContent="✓ Backup downloaded";
                  Object.assign(toast.style,{position:"fixed",bottom:"24px",right:"24px",background:"#1a3a2a",border:"1px solid #60c08066",color:"#60c080",padding:"10px 18px",borderRadius:"8px",fontSize:"13px",zIndex:9999,fontFamily:"Libre Baskerville,serif"});
                  document.body.appendChild(toast);
                  setTimeout(()=>toast.remove(),3000);
                }} style={btn({padding:"10px 18px"})}>
                  ⬇ Export Backup (JSON)
                </button>
                <label style={{...btn({padding:"10px 18px",cursor:"pointer"}), display:"inline-block"}}>
                  ⬆ Import Backup (JSON)
                  <input type="file" accept=".json" style={{display:"none"}} onChange={e=>{
                    const file=e.target.files[0]; if(!file) return;
                    const reader=new FileReader();
                    reader.onload=ev=>{
                      try{
                        const parsed=JSON.parse(ev.target.result);
                        if(!parsed.drawdowns||!parsed.repayments) throw new Error("Invalid backup — missing drawdowns or repayments fields");
                        if(window.confirm(`Import backup from ${parsed.exportedAt?.slice(0,10)||"unknown date"}?\n\nThis will replace all current data.`)){
                          const {exportedAt,version,...rest}=parsed;
                          if(rest.annualReturn!=null&&(isNaN(rest.annualReturn)||rest.annualReturn<=0)) rest.annualReturn=DEFAULT.annualReturn;
                          if(rest.months!=null&&(isNaN(rest.months)||rest.months<=0)) rest.months=DEFAULT.months;
                          if(rest.priceHistory) rest.priceHistory=rest.priceHistory.filter(h=>h.portfolioValue>0);
                          upd(rest);
                          setMarket(null);
                          alert("Data restored. Hit Refresh Market to reload live prices.");
                        }
                      }catch(err){ alert("Could not read backup: "+err.message); }
                    };
                    reader.readAsText(file);
                    e.target.value="";
                  }}/>
                </label>
              </div>
              <div style={{borderTop:"1px solid #1e1e32",paddingTop:16}}>
                <div style={{fontSize:10,letterSpacing:"0.2em",color:"#555570",textTransform:"uppercase",marginBottom:10}}>Current data summary</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,fontSize:12,color:"#8888aa"}}>
                  {[
                    ["Drawdowns",`${(state.drawdowns||[]).length} entries`],
                    ["Repayments",`${(state.repayments||[]).length} entries`],
                    ["Price snapshots",`${(state.priceHistory||[]).length} / 104`],
                    ["Baseline set",state.sp500Baseline?"Yes":"No"],
                  ].map(([k,v])=>(
                    <div key={k} style={{background:"#111118",borderRadius:6,padding:"8px 12px",display:"flex",justifyContent:"space-between"}}>
                      <span>{k}</span><span style={{color:"#c9a84c",fontFamily:"'DM Mono',monospace"}}>{v}</span>
                    </div>
                  ))}
                </div>
              </div>
              <div style={{marginTop:16,paddingTop:16,borderTop:"1px solid #1e1e32"}}>
                <button onClick={()=>{ if(window.confirm("Clear all price history snapshots? Drawdowns and repayments are kept.")) upd({priceHistory:[]}); }} style={btn({background:"none",border:"1px solid #e0606044",color:"#e06060",fontSize:11,padding:"7px 16px"})}>
                  Clear price history
                </button>
              </div>
            </div>
          </div>
        )}

        {/* ══ FAQ ══ */}
        {tab==="faq"&&<FAQAccordion/>}

      </div>

      <div style={{borderTop:"1px solid #1a1a2e",padding:"20px 24px 24px",textAlign:"center"}}>

            target="_blank" rel="noopener noreferrer"
            style={{display:"inline-flex",alignItems:"center",gap:7,fontSize:11,color:"#EF496F",textDecoration:"none",opacity:0.75,transition:"opacity 0.15s"}}
            onMouseEnter={e=>e.currentTarget.style.opacity=1}
            onMouseLeave={e=>e.currentTarget.style.opacity=0.75}>
            <span style={{width:16,height:16,borderRadius:4,background:"#EF496F",display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:"#fff",flexShrink:0}}>S</span>

          </a>

          <span style={{color:"#2a2a40",fontSize:11}}>·</span>

          <div style={{display:"inline-flex",alignItems:"center",gap:10}}>
            <a href="https://buymeacoffee.com/inspiro"
              target="_blank" rel="noopener noreferrer"
              style={{display:"inline-flex",alignItems:"center",gap:7,fontSize:11,color:"#FFDD00",textDecoration:"none",opacity:0.75,transition:"opacity 0.15s"}}
              onMouseEnter={e=>e.currentTarget.style.opacity=1}
              onMouseLeave={e=>e.currentTarget.style.opacity=0.75}>
              <span style={{width:16,height:16,borderRadius:4,background:"#FFDD00",display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:10,flexShrink:0}}>☕</span>
              Buy me a coffee ↗
            </a>
            <a href="https://buymeacoffee.com/inspiro" target="_blank" rel="noopener noreferrer"
              title="Scan to buy a coffee"
              style={{display:"inline-block",lineHeight:0,opacity:0.55,transition:"opacity 0.15s"}}

        <p style={{fontSize:10,color:"#222238"}}>Data stored locally · Free market data via Alpha Vantage · Not financial advice · Inspiro</p>
      </div>

  );
